version: '3.8'

services:
  # Serviço principal da aplicação (Backend Node.js/TypeScript)
  app:
    build: 
      context: .
      dockerfile: Dockerfile
    ports:
      - "${PORT:-3001}:${PORT:-3001}"
    environment:
      - PORT=${PORT:-3001}
      - NODE_ENV=development
      - DATA_CRAZY_API_URL=${DATA_CRAZY_API_URL}
      - DATA_CRAZY_TOKEN=${DATA_CRAZY_TOKEN}
      - COMDINHEIRO_API_KEY=${COMDINHEIRO_API_KEY}
      - PYTHON_MICROSERVICE_URL=http://python-microservice:8000
      - REDIS_URL=redis://redis:6379
      - BRAPI_TOKEN=${BRAPI_TOKEN} # Adicionado para a API de dados de mercado
    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules
    depends_on:
      - python-microservice
    networks:
      - finassist-net

  # Microserviço de Comunicação e Dados (Python)
  python-microservice:
    build:
      context: ./python-microservice
      dockerfile: Dockerfile
    environment:
      - WPP_SESSION_NAME=BOT_FINASSIST
      - SENDGRID_API_KEY=${SENDGRID_API_KEY}
      - SENDER_EMAIL=${SENDER_EMAIL}
      - REDIS_URL=redis://redis:6379
      - BRAPI_TOKEN=${BRAPI_TOKEN} # Adicionado para a API de dados de mercado
    volumes:
      - whatsapp_session:/app/wppconnect/tokens
      - ./python-microservice/tmp:/app/tmp # Volume compartilhado para arquivos temporários
    depends_on:
      - redis
    networks:
      - finassist-net

  # Worker da Fila RQ
  rq-worker:
    build:
      context: ./python-microservice
    command: python worker.py
    environment:
      - WPP_SESSION_NAME=BOT_FINASSIST_WORKER
      - SENDGRID_API_KEY=${SENDGRID_API_KEY}
      - SENDER_EMAIL=${SENDER_EMAIL}
      - REDIS_URL=redis://redis:6379
      - BRAPI_TOKEN=${BRAPI_TOKEN} # Adicionado para a API de dados de mercado
    volumes:
      - whatsapp_session:/app/wppconnect/tokens
      - ./python-microservice/tmp:/app/tmp # Volume compartilhado para arquivos temporários
    depends_on:
      - redis
      - python-microservice
    networks:
      - finassist-net

  # Serviço Redis para a Fila
  redis:
    image: "redis:alpine"
    networks:
      - finassist-net
    volumes:
      - redis_data:/data

networks:
  finassist-net:
    driver: bridge

volumes:
  whatsapp_session:
    driver: local
  redis_data:
    driver: local
# 1. Configurações da Aplicação Principal (Node.js)
#----------------------------------------------------
# Porta em que o backend Node.js irá rodar. O padrão é 3001.
PORT=3001

# Chave da API para o serviço "Data Crazy" (usado nos prompts originais)
DATA_CRAZY_API_URL=https://api.datacrazy.com/
DATA_CRAZY_TOKEN=SUA_CHAVE_DATACRAZY_AQUI


# 2. Configurações do Microserviço (Python)
#----------------------------------------------------

# --- E-mail (SendGrid) ---
# Sua chave de API do SendGrid para permitir o envio de e-mails.
SENDGRID_API_KEY=SG.SUA_CHAVE_SENDGRID_AQUI

# O endereço de e-mail que aparecerá como remetente.
SENDER_EMAIL=rafaelfelix@silomfo.com


# --- Dados de Mercado (Brapi) ---
# Seu token da API da Brapi para buscar dados de ativos brasileiros.
BRAPI_TOKEN=SEU_TOKEN_BRAPI_AQUI

# OBS: A variável WPP_SESSION_NAME é definida diretamente no docker-compose.yml 
# e não precisa estar no seu arquivo .env, mas é bom saber que ela existe.
