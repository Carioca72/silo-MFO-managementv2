
version: '3.8'

services:
  # --- Serviço do Backend Principal (TypeScript) ---
  typescript-backend:
    build:
      context: .
      dockerfile: Dockerfile # Assumindo que você tem um Dockerfile na raiz para o seu app TS
    ports:
      - "3000:3000"
    environment:
      # Adicione aqui variáveis de ambiente para o serviço TS, se necessário
      PYTHON_MICROSERVICE_URL: http://python-microservice:8000
    depends_on:
      - python-microservice

  # --- Serviço do Microserviço de Análise (Python) ---
  python-microservice:
    build:
      context: ./python_microservice
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    # Carrega as variáveis de ambiente do arquivo .env na raiz do projeto
    # para que o Python possa acessar GROQ_API_KEY, etc.
    env_file:
      - .env
